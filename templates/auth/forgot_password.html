{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forgot Password | T-Vault</title>
  <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body class="vault-auth">
  <a href="{% url 'home:landing' %}" class="auth-home">T-Vault</a>
  <main class="auth-shell">
    <section class="auth-panel">
      <div class="auth-mark"><span></span></div>
      <span class="auth-eyebrow">OTP recovery</span>
      <h1>Recover vault access.</h1>
      <p class="auth-intro">Enter your registered email. We will generate a short-lived OTP for password reset verification.</p>
      <form method="post" class="auth-form" data-auth-form novalidate>
        {% csrf_token %}
        <label class="auth-field">
          <span>Registered email</span>
          {{ form.email }}
          <small data-field-hint>Use the email attached to your vault account.</small>
          {% if form.email.errors %}<strong>{{ form.email.errors.0 }}</strong>{% endif %}
        </label>
        <button type="submit" class="auth-submit">Send OTP</button>
      </form>
      <div class="auth-links"><a href="{% url 'users:login' %}">Back to login</a><a href="{% url 'users:register' %}">Create account</a></div>
    </section>
    <aside class="auth-visual login-visual" data-auth-visual aria-hidden="true">
      <div class="scan-card"><span class="scan-line"></span><div class="scan-node n1"></div><div class="scan-node n2"></div><div class="scan-node n3"></div><div class="typing-meter"><i></i><i></i><i></i><i></i></div><h2>OTP Relay</h2><p>Recovery codes are time-boxed and single use.</p></div>
    </aside>
  </main>
  <script src="{% static 'js/auth.js' %}"></script>
</body>
</html>
